<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Free X Video Saver</title>
    <link rel="stylesheet" href="src/popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="brand">
        <img src="assets/icon-48.png" width="40" height="40" alt="">
        <div>
          <h1>Free X Video Saver</h1>
          <p id="status">Open an X post with a video.</p>
        </div>
      </header>

      <section class="actions" aria-label="Video actions">
        <button id="open-tool" type="button">Open Downloader Website</button>
      </section>

      <p class="notice">
        Use this only for videos you own, created, or have permission to save.
      </p>
    </main>

    <script src="src/popup.js"></script>
  </body>
</html>
