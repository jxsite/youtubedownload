<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Free YouTube Downloader</title>
    <link rel="stylesheet" href="src/popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="brand">
        <div class="logo-icon-wrapper">
          <span class="logo-play-icon">?</span>
        </div>
        <div>
          <h1>Free YT Downloader</h1>
          <p id="status">Open a YouTube video to download.</p>
        </div>
      </header>

      <section class="actions" aria-label="YouTube actions">
        <button id="open-tool" type="button">Open Downloader Website</button>
      </section>

      <p class="notice">
        Use this only for content you own, created, or have permission to save.
      </p>
    </main>

    <script src="src/popup.js"></script>
  </body>
</html>
